template:
  - light:
      - name: "Switchman M5 Channel A"
        unique_id: "switchman_m5_channel_a"
        state: "{{ is_state('switch.my_switch_channel_a_state', 'on') }}"
        turn_on:
          action: switch.turn_on
          target:
            entity_id: switch.my_switch_channel_a_state
        turn_off:
          action: switch.turn_off
          target:
            entity_id: switch.my_switch_channel_a_state

      - name: "Switchman M5 Channel B"
        unique_id: "switchman_m5_channel_b"
        state: "{{ is_state('switch.my_switch_channel_b_state', 'on') }}"
        turn_on:
          action: switch.turn_on
          target:
            entity_id: switch.my_switch_channel_b_state
        turn_off:
          action: switch.turn_off
          target:
            entity_id: switch.my_switch_channel_b_state
