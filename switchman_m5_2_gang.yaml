            - if:
                condition:
                  lambda: 'return std::string("${role}") == "slave" && std::string("${master_channel_a_hold_action_entity}") != "";'
                then:
                  - homeassistant.action:
                      action: button.press
                      data:
                        entity_id: "${master_channel_a_hold_action_entity}"
                else:
