substitutions:
  device_friendly_name: "Bedroom light switch"
  device_name: "bedroom-light-switch"

  channel_a_on_service: "light.turn_on"
  channel_a_on_entity: "light.bedroom_ceiling_light"
  channel_a_off_service: "light.turn_off"
  channel_a_off_entity: "light.bedroom_ceiling_light"

  channel_a_hold_service: "light.turn_off"
  channel_a_hold_entity: "light.bedroom_lights"
  hold_start_ms: 500ms

  default_channel_a_mode: "Decoupled"
  default_channel_a_relay_target_mode: "On"
  role: "master"


  sht4x_present: "on"

packages:
  remote_package:
    url: https://github.com/bitosome/esphome-sonoff
    ref: main
    files: ${["switchman_m5_1_gang.yaml", "switchman_m5_sht4x.yaml"] if sht4x_present != "off" else ["switchman_m5_1_gang.yaml"]}
    refresh: 0s
