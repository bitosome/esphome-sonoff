substitutions:
  device_friendly_name: "WC 2 light switch 1"
  device_name: "wc-2-light-switch-1"

  channel_a_on_service: ""
  channel_a_on_entity: ""

  channel_a_off_service: ""
  channel_a_off_entity: ""

  channel_a_hold_service: "light.turn_off"
  channel_a_hold_entity: "light.wc_2_lights"

  default_channel_a_mode: "Decoupled"
  default_channel_a_relay_target_mode: "Off"
  
  role: "slave"
  master_entity_base: "wc_2_light_switch_2"

packages:
  remote_package:
    url: https://github.com/bitosome/esphome-sonoff
    ref: main
    files:
      - switchman_m5_1_gang.yaml
      # - switchman_m5_sht4x.yaml
      - path: switchman_m5_tracked_state.yaml
        vars:
          tracked_channel_id: "a"
          tracked_channel_label: "Channel A"
          tracked_state_key: "mirror"
          tracked_state_label: "Mirror Light"
          tracked_entity_id: "switch.wc_2_mirror_light_switch_channel_a_state"
    refresh: 0s
