substitutions:
  device_friendly_name: "Shower room light switch"
  device_name: "shower-room-light-switch"

  channel_a_on_service: "light.turn_on"
  channel_a_on_entity: "light.shower_room_ceiling_light"

  channel_a_off_service: "light.turn_off"
  channel_a_off_entity: "light.shower_room_ceiling_light"

  channel_a_hold_service: ""
  channel_a_hold_entity: ""

  default_channel_a_mode: "Decoupled"
  default_channel_a_relay_target_mode: "On"

  channel_b_on_service: ""
  channel_b_on_entity: ""

  channel_b_off_service: ""
  channel_b_off_entity: ""

  channel_b_hold_service: ""
  channel_b_hold_entity: ""

  default_channel_b_mode: "Coupled"
  default_channel_b_relay_target_mode: "Off"

  sht4x_present: true

  sht4x_remote_package:
    url: https://github.com/bitosome/esphome-sonoff
    ref: main
    files:
      - switchman_m5_sht4x.yaml
    refresh: 0s

packages:
  - url: https://github.com/bitosome/esphome-sonoff
    ref: main
    files:
      - switchman_m5_2_gang.yaml
    refresh: 0s
  - ${sht4x_remote_package if sht4x_present else {}}
